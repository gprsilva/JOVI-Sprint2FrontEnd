<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <title>Tela de Câmera — JOVI</title>
</head>
<body>
  <div class="phone">
    <div class="camera-screen">
      <div class="fundoTela">

        <!-- ── Status Bar ── -->
        <div class="status-bar-cam">
          <div class="time">9:41</div>
          <div class="icons-group">
            <svg width="18" height="12" viewBox="0 0 18 12" class="icon-svg">
              <rect x="0" y="7" width="3" height="5" rx="1"/>
              <rect x="4" y="5" width="3" height="7" rx="1"/>
              <rect x="8" y="2" width="3" height="10" rx="1"/>
              <rect x="12" y="0" width="3" height="12" rx="1" opacity="0.3"/>
            </svg>
            <svg width="16" height="12" viewBox="0 0 16 12" class="icon-svg">
              <path d="M8 12L16 4C14.5 2.5 11.5 0 8 0C4.5 0 1.5 2.5 0 4L8 12Z"/>
            </svg>
            <div class="battery-container">
              <div class="battery-level"></div>
              <div class="battery-cap"></div>
            </div>
          </div>
        </div>

        <!-- ── Header ── -->
        <div class="header-camera">

          <a href="configuracao.html" class="cam-icon-btn" aria-label="Configurações">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </a>

          <h2 class="cam-title">JOVI</h2>

          <div class="cam-actions">
            <button class="cam-icon-btn" aria-label="Flash">
              <svg viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </button>
            <button class="cam-icon-btn" aria-label="Fechar">
              <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>

        </div>

        <!-- ── Smart-Pop IA — centralizado ── -->
        <div class="smart-pop-wrap">
          <div class="smart-pop">
            <div class="smart-pop-left">
              <span class="smart-pop-ia-badge">IA</span>
              <div class="smart-pop-pulse-ring"></div>
            </div>
            <div class="smart-pop-body">
              <span class="smart-pop-label">Recomendação inteligente</span>
              <span class="smart-pop-mode">Modo Pet</span>
            </div>
            <span class="smart-pop-ok">OK</span>
          </div>
        </div>

        <!-- ── Footer ── -->
        <div class="footer-camera">

          <div class="selector-modos">
            <span class="modo-item">PANORAMA</span>
            <span class="modo-item">VÍDEO</span>
            <span class="modo-item active">FOTO</span>
            <span class="modo-item">RETRATO</span>
            <a href="outrosModos.html" class="modo-item modo-link">MAIS</a>
          </div>

          <div class="shutter-container">
            <button class="cam-ctrl-btn" aria-label="Zoom 2x">
              <span class="cam-ctrl-label">2x</span>
            </button>
            <button class="btn-shutter" aria-label="Capturar foto">
              <span class="btn-shutter-inner"></span>
            </button>
            <button class="cam-ctrl-btn" aria-label="Flash">
              <svg viewBox="0 0 24 24">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </button>
          </div>

          <div class="home-bar"></div>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
