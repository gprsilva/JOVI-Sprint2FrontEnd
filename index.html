<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="5;url=pages/camera.html">
  <link rel="stylesheet" href="css/style.css">
  <title>Tela de Câmera</title>

</head>
<body>
  <div class="phone">
    <div class="camera-screen" style="background:#fff; display:flex; flex-direction:column;">
        <div class="status-bar">
            <!-- Horário -->
            <div class="time">9:41</div>

            <!-- Ícones da Direita -->
            <div class="icons-group">
                <!-- Sinal Celular -->
                <svg width="18" height="12" viewBox="0 0 18 12" class="icon-svg">
                    <rect x="0" y="7" width="3" height="5" rx="1" />
                    <rect x="4" y="5" width="3" height="7" rx="1" />
                    <rect x="8" y="2" width="3" height="10" rx="1" />
                    <rect x="12" y="0" width="3" height="12" rx="1" opacity="0.3" />
                </svg>

                <!-- Wi-Fi -->
                <svg width="16" height="12" viewBox="0 0 16 12" class="icon-svg">
                    <path d="M8 12L16 4C14.5 2.5 11.5 0 8 0C4.5 0 1.5 2.5 0 4L8 12Z" />
                </svg>

                <!-- Bateria -->
                <div class="battery-container">
                    <div class="battery-level"></div>
                    <div class="battery-cap"></div>
                </div>
            </div>
        </div>
        <img src="imgs/Anima.gif" alt="" class="animacao" style="flex:1; object-fit:contain;">

  </div>
</body>
</html>
